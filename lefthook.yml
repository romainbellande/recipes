pre-commit:
  parallel: true
  jobs:
    - name: format
      glob: "*.{astro,css,html,js,json,md,mjs,ts,yaml,yml}"
      run: npx prettier --write {staged_files}
      stage_fixed: true
    - name: lint
      glob: "*.{astro,cjs,js,mjs}"
      run: npx eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  jobs:
    - name: validate
      run: npm run validate
    - name: test
      run: npm test
    - name: check
      run: npm run check
